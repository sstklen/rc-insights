<!DOCTYPE html>
<html>
<head>
<title>rc-insights Demo</title>
<style>
body { background: #1e1e2e; color: #cdd6f4; font-family: monospace; margin: 0; padding: 20px; }
#player { max-width: 900px; margin: 0 auto; }
</style>
</head>
<body>
<div id="player"></div>
<script src="https://cdn.jsdelivr.net/npm/asciinema-player@3.9.0/dist/bundle/asciinema-player.min.js"></script>
<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/asciinema-player@3.9.0/dist/bundle/asciinema-player.min.css" />
<script>
AsciinemaPlayer.create('demo.cast', document.getElementById('player'), {
  theme: 'monokai',
  speed: 0.5,
  idleTimeLimit: 2,
  poster: 'npt:0:3',
  fit: 'width',
  autoPlay: true
});
</script>
</body>
</html>
